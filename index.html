<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Twitch Stream</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    #twitch-embed {
      width: 100%;
      height: 100%;
    }
    iframe {
      border: none;
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div id="twitch-embed"></div>
  <script src="https://player.twitch.tv/js/embed/v1.js"></script>
  <script>
    new Twitch.Player("twitch-embed", {
      channel: "diviosdi",
      parent: ["diviosdi.github.io"],
      autoplay: true,
      muted: true,
      width: "100%",
      height: "100%"
    });
  </script>
</body>
</html>
