<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SL Twitch Wrapper</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  #twitch-embed {
    width: 100%;
    height: 100%;
  }

  #twitch-embed iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100% !important;
    height: 100% !important;
  }
</style>
</head>
<body>

<div id="twitch-embed"></div>

<script src="https://player.twitch.tv/js/embed/v1.js"></script>
<script>
  var player = new Twitch.Player("twitch-embed", {
    channel: "diviosdi",
    parent: ["diviosdi.github.io"],
    autoplay: true,
    muted: true,
    controls: false,
    width: "100%",
    height: "100%"
  });

  player.addEventListener(Twitch.Player.READY, function () {
    player.setQuality("720p30");
    player.setMuted(true);
  });
</script>

</body>
</html>
